name: Refresh and deploy leaderboard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.164.0"
  HUGO_SHA256: "d9c8b17285ea4ec004d9f814273ea910f2051ce02c284993fd1f91ba455ae50d"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install locked Python dependencies
        run: uv sync --locked

      - name: Run unit tests
        run: uv run python -m unittest discover -v

      - name: Generate sanitized leaderboard data
        env:
          KAGGLE_TEAMS: ${{ secrets.KAGGLE_TEAMS }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_API_TOKENS: ${{ secrets.KAGGLE_API_TOKENS }}
          KAGGLE_LEGACY_CREDENTIALS: ${{ secrets.KAGGLE_LEGACY_CREDENTIALS }}
          KAGGLE_AUTO_DISCOVER_TEAMS: "true"
          KAGGLE_SCAN_WORKERS: "2"
          KAGGLE_REQUEST_INTERVAL_SECONDS: "2"
        run: uv run python -m agentkaggle_leaderboard --output data/leaderboard.json

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install pinned Hugo
        shell: bash
        run: |
          set -euo pipefail
          HUGO_ARCHIVE="hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "${RUNNER_TEMP}/${HUGO_ARCHIVE}" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${HUGO_ARCHIVE}"
          echo "${HUGO_SHA256}  ${RUNNER_TEMP}/${HUGO_ARCHIVE}" | sha256sum --check --strict
          tar --extract --gzip --file "${RUNNER_TEMP}/${HUGO_ARCHIVE}" --directory "${RUNNER_TEMP}" hugo
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Build static site
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/" --destination public

      - name: Check public artifact safety
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_API_TOKENS: ${{ secrets.KAGGLE_API_TOKENS }}
          KAGGLE_LEGACY_CREDENTIALS: ${{ secrets.KAGGLE_LEGACY_CREDENTIALS }}
        run: uv run python scripts/check_public_artifact.py public data/leaderboard.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
